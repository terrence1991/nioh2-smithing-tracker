<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仁王2 制作书追踪器 (完整版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
        }
        
        /* 上传区域 */
        .upload-zone {
            border: 3px dashed #4a4a6a;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
        }
        .upload-zone:hover, .upload-zone.dragover {
            border-color: #f39c12;
            background: rgba(243,156,18,0.1);
        }
        .upload-zone input { display: none; }
        .upload-icon { font-size: 4em; margin-bottom: 15px; }
        
        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: linear-gradient(135deg, #2d2d4a 0%, #1a1a2e 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 1px solid #3a3a5a;
        }
        .stat-card h3 { color: #888; font-size: 0.9em; margin-bottom: 10px; }
        .stat-card .number { font-size: 2.2em; font-weight: bold; }
        .stat-card .progress { font-size: 0.85em; color: #888; margin-top: 5px; }
        .stat-card.smithing .number { color: #e74c3c; }
        .stat-card.skill .number { color: #f39c12; }
        .stat-card.total .number { color: #2ecc71; }
        
        /* 控制栏 */
        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .search-box {
            flex: 1;
            min-width: 250px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 25px;
            background: #2d2d4a;
            color: #e0e0e0;
            font-size: 1em;
        }
        .search-box input::placeholder { color: #666; }
        
        .filter-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: #2d2d4a;
            color: #e0e0e0;
            cursor: pointer;
            transition: all 0.3s;
        }
        .filter-btn:hover { background: #3d3d5a; }
        .filter-btn.active { background: #f39c12; color: #1a1a2e; }
        
        /* 物品网格 */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 15px;
        }
        .item-card {
            background: linear-gradient(135deg, #2d2d4a 0%, #1a1a2e 100%);
            border-radius: 12px;
            padding: 20px;
            border: 2px solid transparent;
            transition: all 0.3s;
            position: relative;
        }
        .item-card:hover { transform: translateY(-3px); border-color: #4a4a6a; }
        .item-card.collected { 
            border-color: #2ecc71; 
            background: linear-gradient(135deg, #1e3a2e 0%, #1a2e1a 100%); 
        }
        .item-card.collected::before {
            content: '✓';
            position: absolute;
            top: 10px;
            right: 15px;
            color: #2ecc71;
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .item-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 10px; 
        }
        .item-name { 
            font-size: 1.1em; 
            font-weight: bold; 
            color: #f39c12; 
            flex: 1;
            margin-right: 10px;
        }
        .item-id { 
            font-size: 0.8em; 
            color: #666; 
            background: #1a1a2e; 
            padding: 3px 8px; 
            border-radius: 5px; 
            white-space: nowrap;
        }
        
        .item-info { margin-bottom: 10px; }
        .item-type { 
            font-size: 0.9em; 
            color: #888; 
            margin-bottom: 5px;
            display: flex;
            gap: 10px;
        }
        .item-category { 
            display: inline-block; 
            padding: 3px 10px; 
            background: #3a3a5a; 
            border-radius: 10px; 
            font-size: 0.8em; 
        }
        
        .item-drop {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.2);
            border-radius: 8px;
            border-left: 3px solid #f39c12;
        }
        .item-drop-label {
            font-size: 0.85em;
            color: #f39c12;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .item-drop-text {
            font-size: 0.9em;
            color: #ccc;
            line-height: 1.5;
            white-space: pre-line;
        }
        
        .item-note {
            margin-top: 8px;
            padding: 8px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 8px;
            font-size: 0.85em;
            color: #5dade2;
        }
        
        /* 按钮 */
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            margin: 5px;
        }
        .btn-primary { background: linear-gradient(90deg, #f39c12, #e74c3c); color: white; }
        .btn-secondary { background: #3a3a5a; color: #e0e0e0; }
        .btn:hover { transform: scale(1.05); }
        
        .hidden { display: none; }
        
        /* 标签 */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75em;
            margin-left: 5px;
        }
        .badge-weapon { background: #e74c3c; }
        .badge-armor { background: #3498db; }
        .badge-helmet { background: #9b59b6; }
        .badge-skill { background: #f39c12; }
        .badge-dlc { background: #e67e22; }
        
        /* 分类标题 */
        .category-header {
            grid-column: 1 / -1;
            padding: 15px 20px;
            margin: 10px 0;
            background: linear-gradient(90deg, #3a3a5a 0%, #2a2a4a 100%);
            border-radius: 10px;
            font-size: 1.3em;
            font-weight: bold;
            color: #f39c12;
            border-left: 4px solid #f39c12;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>仁王2 制作书追踪器</h1>
        <p class="subtitle">官方中文 + 掉落信息 | 数据来源：QQ群539591455 + NiohWiki</p>
        
        <!-- 上传区域 -->
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon">📁</div>
            <p style="font-size: 1.2em; margin-bottom: 10px;">拖拽存档文件到这里</p>
            <p style="color: #888; margin-bottom: 20px;">支持 .json, .sav, .bin 格式</p>
            <input type="file" id="fileInput" accept=".json,.sav,.bin,.BIN">
            <button class="btn btn-secondary" onclick="document.getElementById('fileInput').click()">选择文件</button>
            <button class="btn btn-primary" onclick="loadSampleData()">加载示例数据</button>
        </div>
        
        <!-- 统计 -->
        <div class="stats-grid" id="statsGrid" style="display: none;">
            <div class="stat-card smithing">
                <h3>📜 制作书</h3>
                <div class="number" id="smithingCount">0</div>
                <div class="progress" id="smithingProgress">0 / 360</div>
            </div>
            <div class="stat-card skill">
                <h3>📖 秘传书</h3>
                <div class="number" id="skillCount">0</div>
                <div class="progress" id="skillProgress">0 / 35</div>
            </div>
            <div class="stat-card total">
                <h3>✅ 总进度</h3>
                <div class="number" id="totalCount">0</div>
                <div class="progress" id="totalProgress">0%</div>
            </div>
        </div>
        
        <!-- 控制栏 -->
        <div class="controls" id="controls" style="display: none;">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索名称、ID或掉落来源...">
            </div>
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="weapon">武器</button>
            <button class="filter-btn" data-filter="armor">防具</button>
            <button class="filter-btn" data-filter="helmet">头盔</button>
            <button class="filter-btn" data-filter="skill">秘传书</button>
            <button class="filter-btn" data-filter="collected">已收集</button>
            <button class="filter-btn" data-filter="missing">未收集</button>
        </div>
        
        <!-- 物品列表 -->
        <div class="items-grid" id="itemsGrid"></div>
    </div>
    
    <script src="official-chinese-names-complete.js"></script>
    <script src="armor-smithing-drops.js"></script>
    <script src="weapon-smithing-drops.js"></script>
    <script>
        // 状态
        let allItems = [];
        let collectedIds = new Set();
        let currentFilter = 'all';
        
        // 初始化物品列表
        function initItems() {
            allItems = [];
            
            // 制作书
            Object.entries(SMITHING_TEXTS_CN || {}).forEach(([id, name]) => {
                // 查找掉落信息（先查防具，再查武器）
                let dropInfo = null;
                
                // 查防具
                Object.entries(ARMOR_SMITHING_DATA || {}).forEach(([key, data]) => {
                    if (data.id === id || data.name === name) {
                        dropInfo = data;
                    }
                });
                
                // 查武器
                if (!dropInfo) {
                    Object.entries(WEAPON_SMITHING_DATA || {}).forEach(([key, data]) => {
                        if (data.id === id || data.name === name) {
                            dropInfo = data;
                        }
                    });
                }
                
                // 确定类型
                let type = 'weapon';
                let typeLabel = '武器';
                if (name.includes('铠') || name.includes('装束') || name.includes('衣') || name.includes('甲')) {
                    type = 'armor';
                    typeLabel = '防具';
                } else if (name.includes('头盔') || name.includes('面') || name.includes('帽子') || name.includes('头巾')) {
                    type = 'helmet';
                    typeLabel = '头盔';
                } else if (name.includes('弓') || name.includes('火枪') || name.includes('大炮')) {
                    type = 'weapon';
                    typeLabel = '远程武器';
                }
                
                allItems.push({
                    id: id,
                    name: name,
                    type: type,
                    typeLabel: typeLabel,
                    drop: dropInfo?.drop || '未知',
                    note: dropInfo?.note || ''
                });
            });
            
            // 秘传书
            Object.entries(SKILL_BOOKS_CN || {}).forEach(([id, name]) => {
                allItems.push({
                    id: id,
                    name: name,
                    type: 'skill',
                    typeLabel: '秘传书',
                    drop: '技能任务或BOSS掉落',
                    note: ''
                });
            });
            
            console.log(`已加载 ${allItems.length} 个物品`);
        }
        
        // 渲染物品
        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = allItems.filter(item => {
                // 搜索
                if (searchTerm) {
                    const searchFields = [item.name, item.id, item.drop, item.note].join(' ').toLowerCase();
                    if (!searchFields.includes(searchTerm)) {
                        return false;
                    }
                }
                
                // 过滤
                const isCollected = collectedIds.has(item.id);
                if (currentFilter === 'collected' && !isCollected) return false;
                if (currentFilter === 'missing' && isCollected) return false;
                if (currentFilter === 'weapon' && item.type !== 'weapon') return false;
                if (currentFilter === 'armor' && item.type !== 'armor') return false;
                if (currentFilter === 'helmet' && item.type !== 'helmet') return false;
                if (currentFilter === 'skill' && item.type !== 'skill') return false;
                
                return true;
            });
            
            // 按类型分组
            const grouped = {};
            filtered.forEach(item => {
                const group = item.type;
                if (!grouped[group]) grouped[group] = [];
                grouped[group].push(item);
            });
            
            // 渲染
            let html = '';
            const groupOrder = ['weapon', 'armor', 'helmet', 'skill'];
            const groupNames = {
                weapon: '⚔️ 武器制作书',
                armor: '🛡️ 防具制作书',
                helmet: '🎭 头盔制作书',
                skill: '📖 秘传书'
            };
            
            groupOrder.forEach(group => {
                if (grouped[group] && grouped[group].length > 0) {
                    html += `<div class="category-header">${groupNames[group]} (${grouped[group].length})</div>`;
                    
                    grouped[group].forEach(item => {
                        const isCollected = collectedIds.has(item.id);
                        const badge = `badge-${item.type}`;
                        const dlc = item.name.includes('DLC') ? '<span class="badge badge-dlc">DLC</span>' : '';
                        
                        html += `
                            <div class="item-card ${isCollected ? 'collected' : ''}" data-id="${item.id}">
                                <div class="item-header">
                                    <span class="item-name">${item.name}</span>
                                    <span class="item-id">${item.id}</span>
                                </div>
                                <div class="item-info">
                                    <span class="item-category ${badge}">${item.typeLabel}</span>
                                    ${dlc}
                                </div>
                                ${item.drop && item.drop !== '未知' ? `
                                    <div class="item-drop">
                                        <div class="item-drop-label">📍 掉落来源</div>
                                        <div class="item-drop-text">${item.drop}</div>
                                    </div>
                                ` : ''}
                                ${item.note ? `
                                    <div class="item-note">💡 ${item.note}</div>
                                ` : ''}
                            </div>
                        `;
                    });
                }
            });
            
            grid.innerHTML = html;
            updateStats();
        }
        
        // 更新统计
        function updateStats() {
            const smithingTotal = allItems.filter(i => i.type !== 'skill').length;
            const skillTotal = allItems.filter(i => i.type === 'skill').length;
            
            const smithingCollected = allItems.filter(i => i.type !== 'skill' && collectedIds.has(i.id)).length;
            const skillCollected = allItems.filter(i => i.type === 'skill' && collectedIds.has(i.id)).length;
            
            document.getElementById('smithingCount').textContent = smithingCollected;
            document.getElementById('smithingProgress').textContent = `${smithingCollected} / ${smithingTotal}`;
            
            document.getElementById('skillCount').textContent = skillCollected;
            document.getElementById('skillProgress').textContent = `${skillCollected} / ${skillTotal}`;
            
            const total = smithingCollected + skillCollected;
            const totalAll = smithingTotal + skillTotal;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('totalProgress').textContent = `${Math.round(total/totalAll*100)}%`;
        }
        
        // 加载示例数据
        function loadSampleData() {
            collectedIds = new Set(['7D19', '5D29', '70D4', '1FD0', '4735', '05F4', 'CDAA', '82D7', 'F701']);
            
            document.getElementById('statsGrid').style.display = 'grid';
            document.getElementById('controls').style.display = 'flex';
            renderItems();
        }
        
        // 文件上传处理
        document.getElementById('uploadZone').addEventListener('dragover', (e) => {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        });
        
        document.getElementById('uploadZone').addEventListener('dragleave', (e) => {
            e.currentTarget.classList.remove('dragover');
        });
        
        document.getElementById('uploadZone').addEventListener('drop', (e) => {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            handleFile(e.dataTransfer.files[0]);
        });
        
        document.getElementById('fileInput').addEventListener('change', (e) => {
            handleFile(e.target.files[0]);
        });
        
        function handleFile(file) {
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    
                    try {
                        const text = new TextDecoder().decode(data);
                        const json = JSON.parse(text);
                        parseJsonData(json);
                    } catch {
                        parseBinaryData(data);
                    }
                    
                    document.getElementById('statsGrid').style.display = 'grid';
                    document.getElementById('controls').style.display = 'flex';
                    renderItems();
                } catch (err) {
                    alert('文件解析失败: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }
        
        function parseJsonData(json) {
            collectedIds = new Set();
            if (json.items && Array.isArray(json.items)) {
                json.items.forEach(item => {
                    if (item.id) {
                        collectedIds.add(item.id.toString(16).toUpperCase().padStart(4, '0'));
                    }
                });
            }
        }
        
        function parseBinaryData(data) {
            collectedIds = new Set();
            const header = new TextDecoder().decode(data.slice(0, 7));
            if (header !== 'NIOHUSR') {
                throw new Error('非仁王2存档文件或文件已加密');
            }
            
            const ITEM_START = 0x105EC8;
            const ITEM_SIZE = 0x88;
            const ITEM_SLOTS = 900;
            
            for (let i = 0; i < ITEM_SLOTS; i++) {
                const offset = ITEM_START + (i * ITEM_SIZE);
                if (offset + 4 > data.length) break;
                const id = (data[offset + 1] << 8) | data[offset];
                if (id > 0) {
                    collectedIds.add(id.toString(16).toUpperCase().padStart(4, '0'));
                }
            }
        }
        
        // 搜索
        document.getElementById('searchInput').addEventListener('input', renderItems);
        
        // 过滤器
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                renderItems();
            });
        });
        
        // 初始化
        initItems();
    </script>
</body>
</html>
